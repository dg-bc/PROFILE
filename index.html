<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body>
    <div class="main-container">

        <!-- 关于我部分 -->
        <section class="content-section" id="about">
            <h2><i class="fas fa-user"></i> 关于我</h2>
            <p>热爱编程和技术探索，专注于软件开发与创新。喜欢学习新技术，乐于分享知识。</p>
        </section>

        <div class="video-grid">
            <div class="video-wrapper">
                <video controls>
                    <source src="assets/videos/skiintongzhou.mp4" type="video/mp4">
                    您的浏览器不支持视频标签。
                </video>
            </div>
            <div class="video-wrapper">
                <iframe 
                    src="https://player.bilibili.com/player.html?isOutside=true&aid=113005824051392&bvid=BV12uW5eiEA7&cid=500001658511619&p=1"
                    allowfullscreen="true"
                    loading="lazy"
                    scrolling="no"
                    frameborder="no"
                    framespacing="0">
                </iframe>
            </div>
        </div>
        <iframe 
            src="https://gitee.com/饶辅天/笔记/network" 
            width="100%" 
            height="600" 
            frameborder="0" 
            scrolling="auto">
        </iframe>
        <!-- 生活剪影 -->
        <section id="gallery" class="content-card scroll-animate">
            <div class="card-inner">
                <h2><i class="fas fa-camera"></i> 生活剪影</h2>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="assets/images/hobby-photo.jpg" alt="户外运动" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/photosh1.jpg" alt="摄影作品" loading="lazy">
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系方式 -->
        <section id="contact" class="content-card dark scroll-animate">
            <div class="card-inner">
                <h2><i class="fas fa-envelope"></i> 联系方式</h2>
                <div class="contact-info">
                    <p><i class="fas fa-envelope"></i> 3555957586@qq.com</p>
                    <p><i class="fas fa-mobile-alt"></i> +86 186-1406-8682</p>
                    <div class="social-links">
                        <a href="https://github.com/dg-bc" target="_blank">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://user.qzone.qq.com/3555957586/infocenter" target="_blank">
                            <i class="fab fa-qq"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- 照片展示 -->
            <div class="media-section" style="margin-top: 30px;">
                <h3><i class="fas fa-images"></i> 照片</h3>
                <div class="media-grid">
                    <img src="assets/images/photosh1.jpg" alt="照片1" class="gallery-image" loading="lazy">
                    <img src="assets/images/hobby-photo.jpg" alt="爱好照片" class="gallery-image" loading="lazy">
                </div>
            </div>
        </section>

        <!-- 联系方式部分 -->
        <section class="content-section contact-section" id="contact">
            <h2><i class="fas fa-envelope"></i> 联系方式</h2>
            <div class="contact-info">
                <p><i class="fas fa-envelope"></i> 邮箱: 3555957586@qq.com</p>
                <p><i class="fas fa-phone"></i> 电话: +86 186-1406-8682</p>
            </div>
            <div class="social-links">
                <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="#" target="_blank"><i class="fab fa-weibo"></i></a>
                <a href="#" target="_blank"><i class="fab fa-weixin"></i></a>
            </div>

    </main>

        <!-- 页脚 -->
        <footer class="footer-section">
            <p>&copy; 2023 饶辅天. 保留所有权利.</p>
        </footer>
    </div>

    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#FFFFFF' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                move: { enable: true, speed: 1 }
            }
        });

        // 滚动动画
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.scroll-animate').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
